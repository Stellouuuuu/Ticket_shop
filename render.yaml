# Blueprint Render — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: festichill-ticket-shop
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /tickets
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # --- MySQL (AlwaysData) ---
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_REMOTE
        value: "true"
      # --- Admin ---
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        sync: false
      # --- Resend (emails sur Render) ---
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Festichill <onboarding@resend.dev>"
      - key: RESEND_ACCOUNT_EMAIL
        sync: false
